name: Counter sync
# Fetches the Counter sheet's published CSV (reader submissions for Ask the
# Baker / Letters to the King / The Crumb Board) and commits it as
# /counter.csv, because the 5:00 AM bake's cloud sandbox cannot reach
# docs.google.com directly. Runs 15 minutes before the bake.
on:
  schedule:
    - cron: '45 11 * * *'   # 4:45 AM Pacific during PDT; nudge with the bake when DST ends
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch published Counter CSV
        run: |
          curl -sSL --fail --retry 3 -o counter.csv.new \
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLZpQtsFE0aGPesDlZceSy-4nRa6GV0TvLM7jJPToJp43Ml0vtRomQpovm4Sbed6JKo9B4h7gh76TE/pub?output=csv"
          if ! head -1 counter.csv.new | grep -q 'Timestamp'; then
            echo "Unexpected body; keeping the previous counter.csv." >&2
            rm -f counter.csv.new
            exit 0
          fi
          mv counter.csv.new counter.csv
      - name: Commit if changed
        run: |
          git config user.name "ddb-counter-sync"
          git config user.email "actions@davidsdailybread.com"
          git add counter.csv
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "Counter sync: $(date -u +%F)"
            git push
          fi
