<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secret Menu — David's Daily Bread</title>
<meta name="description" content="The secret menu: every note you've scribbled on David's Daily Bread, gathered in one place.">
<link rel="canonical" href="https://davidsdailybread.com/secret-menu.html">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="robots" content="noindex">
<meta property="og:type" content="website">
<meta property="og:site_name" content="David's Daily Bread">
<meta property="og:title" content="Secret Menu — David's Daily Bread">
<meta property="og:description" content="Every note you've scribbled, gathered in one place.">
<meta property="og:url" content="https://davidsdailybread.com/secret-menu.html">
<meta property="og:image" content="https://davidsdailybread.com/og-card.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0e0e12; --panel:#16151a; --ink:#ece7db; --muted:#a7a08f; --faint:#6f6a60; --line:#28272e; --line-strong:#3a3941; --gold:#c8a24a; --gold-soft:#8f7538; --steel:#6f9fce; --steel-soft:#456f9c; --marker:#b9772a; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.6; background-image: radial-gradient(130% 70% at 50% 0%, rgba(200,162,74,0.06), transparent 62%); }
  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: linear-gradient(90deg, var(--gold), var(--steel)); z-index: 10; transition: width 0.08s linear; }
  .paper { max-width: 900px; margin: 30px auto; background: var(--panel); padding: 44px 52px 34px; border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 16px 50px rgba(0,0,0,0.5); }
  .masthead { text-align: center; }
  .masthead-art-link { display: block; }
  .masthead-art { display: block; width: 100%; max-width: 560px; margin: 0 auto; height: auto; }
  .tagline { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--faint); margin-top: 10px; }
  .tagline a { color: var(--muted); text-decoration: none; padding-bottom: 2px; border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tagline a:hover { color: var(--gold); border-bottom-color: var(--gold-soft); }
  .tagline .sep { color: var(--line-strong); margin: 0 6px; }
  .cat-hero { position: relative; border-top: 2px solid var(--line-strong); border-bottom: 2px solid var(--line-strong); padding: 18px 0 16px; margin-top: 18px; text-align: center; }
  .cat-hero::before { content:""; position:absolute; left:0; right:0; top:5px; height:1px; background: linear-gradient(90deg, transparent, var(--gold-soft), transparent); }
  .cat-hero h1 { font-family: 'Newsreader', Georgia, serif; font-size: 30px; font-weight: 600; margin: 0; letter-spacing: -0.3px; }
  .cat-hero p { font-family: 'Newsreader', Georgia, serif; font-style: italic; font-size: 16px; color: var(--muted); margin: 6px 0 0; }
  .menu-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 26px; }
  .menu-count { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
  .menu-actions { display: flex; gap: 10px; }
  .act-btn { display: inline-flex; align-items: center; gap: 7px; background: rgba(200,162,74,0.10); color: var(--gold); border: 1px solid var(--gold-soft); border-radius: 999px; padding: 6px 15px; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .act-btn:hover { background: rgba(200,162,74,0.22); }
  .act-btn.ghost { background: none; color: var(--muted); border-color: var(--line-strong); }
  .act-btn.ghost:hover { color: var(--gold); border-color: var(--gold-soft); }
  .note-list { margin-top: 18px; display: flex; flex-direction: column; gap: 16px; }
  .note-card { background: linear-gradient(160deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.09); border-radius: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.07); padding: 20px 24px; }
  .note-card .where { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--marker); }
  .note-card h3 { font-family: 'Newsreader', Georgia, serif; font-size: 19px; line-height: 1.28; margin: 5px 0 10px; font-weight: 600; }
  .note-card h3 a { color: inherit; text-decoration: none; }
  .note-card h3 a:hover { color: var(--gold); }
  .note-card .note-text { font-family: 'Caveat', cursive; font-size: 19px; line-height: 1.4; color: var(--ink); background: rgba(200,162,74,0.05); border: 1px dashed var(--gold-soft); border-radius: 14px; padding: 10px 14px; white-space: pre-wrap; word-wrap: break-word; }
  .note-card .src { font-size: 11px; color: var(--faint); margin-top: 8px; word-break: break-all; }
  .note-card .src a { color: var(--faint); text-decoration: none; border-bottom: 1px solid var(--line-strong); }
  .note-card .src a:hover { color: var(--gold); border-bottom-color: var(--gold-soft); }
  .empty { text-align: center; padding: 46px 20px; border: 1px dashed var(--line-strong); border-radius: 22px; margin-top: 18px; }
  .empty .big { font-family: 'Caveat', cursive; font-size: 27px; color: var(--muted); }
  .empty p { color: var(--faint); font-size: 13.5px; margin: 8px 0 0; }
  .empty a { color: var(--gold); }
  .colophon { text-align: center; font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); border-top: 1px solid var(--line); margin-top: 34px; padding-top: 14px; }
  .colophon a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--line-strong); }
  .colophon a:hover { color: var(--gold); border-bottom-color: var(--gold-soft); }
  @media (max-width: 640px) {
    .paper { padding: 30px 22px; margin: 12px; }
    .masthead-art { max-width: 100%; }
    .cat-hero h1 { font-size: 25px; }
  }
</style>
</head>
<body>
<div id="progress"></div>
<div class="paper">
  <header class="masthead">
    <a class="masthead-art-link" href="/"><img class="masthead-art" src="/header-art.png" alt="David's Daily Bread" width="1124" height="418"></a>
    <div class="tagline"><a href="/tech.html">Technology</a><span class="sep">&middot;</span><a href="/markets.html">Markets</a><span class="sep">&middot;</span><a href="/science.html">Science</a></div>
    <div class="cat-hero">
      <h1>Secret Menu</h1>
      <p>Off the printed menu: every note you've scribbled, in one place.</p>
    </div>
  </header>

  <div class="menu-bar">
    <div class="menu-count" id="noteCount">Loading notes&hellip;</div>
    <div class="menu-actions">
      <a class="act-btn" id="emailBtn" href="#" style="display:none">&#9993; Export via email</a>
      <button class="act-btn ghost" id="copyBtn" type="button" style="display:none">Copy export</button>
    </div>
  </div>

  <div id="noteList" class="note-list"></div>
  <div id="emptyState" class="empty" style="display:none">
    <div class="big">The oven's empty &mdash; no notes yet.</div>
    <p>Scribble something under any story on the <a href="/">latest edition</a> and it'll show up here.</p>
  </div>

  <div class="colophon"><a href="/">&larr; Latest edition</a> &middot; <a href="/archive.html">Past editions</a></div>
</div>
<script>
  (function () { var bar = document.getElementById('progress'); function u(){ var h=document.documentElement; var m=h.scrollHeight-h.clientHeight; bar.style.width=(m>0?(h.scrollTop||document.body.scrollTop)/m*100:0)+'%'; } window.addEventListener('scroll',u,{passive:true}); window.addEventListener('resize',u); u(); })();
  (function () {
    var PREFIX = 'ddb-note:';
    var PAGE_NAMES = { 'home': ['Page notes — Home', '/'], 'tech': ['Page notes — Technology', '/tech.html'], 'markets': ['Page notes — Markets', '/markets.html'], 'science': ['Page notes — Science', '/science.html'] };
    var listEl = document.getElementById('noteList');
    var countEl = document.getElementById('noteCount');
    var emptyEl = document.getElementById('emptyState');
    var emailBtn = document.getElementById('emailBtn');
    var copyBtn = document.getElementById('copyBtn');

    // 1. Collect notes from localStorage
    var notes = [];
    try {
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(PREFIX) === 0) {
          var raw = k.slice(PREFIX.length);
          var val = localStorage.getItem(k);
          if (val && val.trim()) { notes.push({ key: raw, text: val }); }
        }
      }
    } catch (e) {}

    // Page notes first is unnatural on a menu — stories first, page notes last.
    notes.sort(function (a, b) {
      var ap = a.key.indexOf('page:') === 0 ? 1 : 0;
      var bp = b.key.indexOf('page:') === 0 ? 1 : 0;
      if (ap !== bp) return ap - bp;
      return a.key < b.key ? -1 : 1;
    });

    if (!notes.length) {
      countEl.textContent = 'No notes yet';
      emptyEl.style.display = '';
      return;
    }
    countEl.textContent = notes.length + (notes.length === 1 ? ' note on file' : ' notes on file');

    // 2. Resolve story titles by scanning site pages (current edition, then archive)
    var titles = {}; // note key -> headline text
    function harvest(doc) {
      var boxes = doc.querySelectorAll('[data-note-key]');
      for (var j = 0; j < boxes.length; j++) {
        var nk = boxes[j].getAttribute('data-note-key');
        if (!nk || titles[nk]) continue;
        var card = boxes[j].previousElementSibling;
        if (!card) continue;
        var h = card.querySelector('h3') || card.querySelector('h1');
        if (h && h.textContent.trim()) { titles[nk] = h.textContent.trim(); }
      }
    }
    function unresolved() {
      return notes.filter(function (n) { return n.key.indexOf('page:') !== 0 && !titles[n.key]; }).length;
    }
    function fetchDoc(url) {
      return fetch(url, { cache: 'no-cache' }).then(function (r) {
        if (!r.ok) throw new Error(r.status);
        return r.text();
      }).then(function (html) {
        return new DOMParser().parseFromString(html, 'text/html');
      });
    }

    var corePages = ['/', '/tech.html', '/markets.html', '/science.html'];
    Promise.all(corePages.map(function (u) { return fetchDoc(u).then(harvest).catch(function () {}); }))
      .then(function () {
        if (!unresolved()) return;
        // Older notes: walk the archive, newest first, until everything's titled (cap 14 editions)
        return fetch('/archive.json', { cache: 'no-cache' }).then(function (r) { return r.json(); }).then(function (a) {
          var files = (a.editions || []).map(function (e) { return '/' + e.file; }).slice(0, 14);
          var chain = Promise.resolve();
          files.forEach(function (f) {
            chain = chain.then(function () {
              if (!unresolved()) return;
              return fetchDoc(f).then(harvest).catch(function () {});
            });
          });
          return chain;
        }).catch(function () {});
      })
      .then(render).catch(render);

    // 3. Render + export
    function displayTitle(n) {
      if (n.key.indexOf('page:') === 0) {
        var p = PAGE_NAMES[n.key.slice(5)];
        return p ? p[0] : 'Page notes — ' + n.key.slice(5);
      }
      if (titles[n.key]) return titles[n.key];
      try { var u = new URL(n.key); return 'Story at ' + u.hostname.replace(/^www\./, ''); } catch (e) { return n.key; }
    }
    function linkFor(n) {
      if (n.key.indexOf('page:') === 0) {
        var p = PAGE_NAMES[n.key.slice(5)];
        return 'https://davidsdailybread.com' + (p ? p[1] : '/');
      }
      return n.key;
    }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function render() {
      listEl.innerHTML = '';
      for (var j = 0; j < notes.length; j++) {
        var n = notes[j];
        var isPage = n.key.indexOf('page:') === 0;
        var card = document.createElement('article');
        card.className = 'note-card';
        card.innerHTML =
          '<div class="where">' + (isPage ? 'Page note' : 'Story note') + '</div>' +
          '<h3><a href="' + esc(linkFor(n)) + '">' + esc(displayTitle(n)) + '</a></h3>' +
          '<div class="note-text">' + esc(n.text) + '</div>' +
          '<div class="src"><a href="' + esc(linkFor(n)) + '">' + esc(linkFor(n)) + '</a></div>';
        listEl.appendChild(card);
      }
      buildExport();
    }

    function buildExport() {
      var today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      var lines = [];
      lines.push("DAVID'S DAILY BREAD — SECRET MENU");
      lines.push('Notes exported ' + today);
      lines.push('');
      var urls = [];
      for (var j = 0; j < notes.length; j++) {
        var n = notes[j];
        var num = j + 1;
        lines.push(num + '. ' + displayTitle(n));
        lines.push('   Note: ' + n.text.replace(/\n/g, '\n         '));
        lines.push('   Story: ' + displayTitle(n) + ' <' + linkFor(n) + '>');
        lines.push('');
        urls.push('[' + num + '] ' + linkFor(n));
      }
      lines.push('----------------------------------------');
      lines.push('FULL LINKS (written out in case the links above stop working in transfer)');
      for (var m = 0; m < urls.length; m++) { lines.push(urls[m]); }
      lines.push('');
      lines.push('Baked fresh at https://davidsdailybread.com/secret-menu.html');
      var body = lines.join('\n');

      emailBtn.style.display = '';
      copyBtn.style.display = '';
      emailBtn.href = 'mailto:?subject=' + encodeURIComponent("Secret Menu — my Daily Bread notes") + '&body=' + encodeURIComponent(body);
      copyBtn.addEventListener('click', function () {
        var done = function () { copyBtn.textContent = 'Copied!'; setTimeout(function () { copyBtn.textContent = 'Copy export'; }, 1600); };
        if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(body).then(done); }
        else {
          var t = document.createElement('textarea'); t.value = body; document.body.appendChild(t); t.select();
          try { document.execCommand('copy'); done(); } catch (e) {}
          document.body.removeChild(t);
        }
      });
    }
  })();
</script>
</body>
</html>
